name: CI — Dibitara

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Lint + Tests + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permissions Gradle
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew lint

      - name: Tests unitaires
        run: ./gradlew test

      - name: Rapport de couverture (seuil 80% sur domain/)
        run: ./gradlew koverVerify

      - name: Build debug
        run: ./gradlew assembleDebug

      - name: Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: dibitara-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
